services:
  voidshift:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voidshift
    restart: unless-stopped

    ports:
      - "8080:8080"
      - "51820:51820/udp"

    cap_add:
      - NET_ADMIN

    devices:
      - /dev/net/tun:/dev/net/tun

    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1

    healthcheck:
      test: ["CMD", "wget -q -O- http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"


